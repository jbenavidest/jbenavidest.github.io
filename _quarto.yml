website:
   title: "Juan Benavides-Tocarruncho"
   image: images/exeter.png
   description: "Quarto Academic Website Template adapted by Dr. Gang He"
 
navbar:
    background: light  # You can change the background color here

    left:   # You can comment out all navigation items here if you just like to keep the index page only
      - text: Home
        href: index.qmd
      - text: About
        menu:
          - text: News
            href: pages/posts.qmd#category=news
          - text: Events
            href: pages/posts.qmd#category=event      
          - text: Contact
            href: pages/contact.qmd             
      - text: Research
        menu:
          - text: Publications Listing  # Automatically generated from publications.xlsx
            href: pages/pub-listing.qmd
          - text: Publications  # Manually curated list of publications
            href: pages/publications.qmd            
          - text: Selected Papers
            href: posts.qmd#category=paper
          - text: Grants
            href: pages/projects.qmd                                
      #- text: Teaching # Comment the Teaching part out to remove the Teaching page
      #  href: teaching.qmd
      - text: Outreach
        menu:        
        - text: Presentations
          href: pages/posts.qmd#category=presentation                   
      - text: Group   # Comment the Group part out to remove the Group page
        href: pages/people.qmd

    right: 
      - text: CV
        href: files/CV-JuanPablo_Benavides-Tocarruncho.pdf
      - icon: github
        href: https://github.com/jbenavidest
        target: _blank
      # - icon: rss
      #   href: posts.xml
      #   target: _blank
  
page-navigation: true
  
  
page-footer: 
